<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewelry Stock Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background: #f4f4f9; color: #333; }
        h2 { color: #2c3e50; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 2px dashed #3498db; border-radius: 8px; background: #000; }
        .btn { padding: 12px 20px; font-size: 16px; margin: 10px 5px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-primary { background: #3498db; }
        .btn-success { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        #result-box { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; text-align: left; }
        .found { border-left: 5px solid #2ecc71; }
        .not-found { border-left: 5px solid #e74c3c; }
        .stat { font-size: 18px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        input[type="file"] { margin: 15px 0; display: block; margin-left: auto; margin-right: auto; }
        
        /* Preview Table Styles */
        #preview-container { margin-top: 20px; overflow-x: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .checked-row { background-color: #d4edda; }
    </style>
</head>
<body>

    <h2>📦 Jewelry Stock Checker</h2>
    <p class="stat">Scanned: <span id="checkedCount">0</span> / <span id="totalCount">0</span></p>

    <input type="file" id="fileInput" accept=".xlsx, .xls">
    
    <!-- DATA PREVIEW TABLE -->
    <div id="preview-container">
        <h3 style="text-align: left; color: #2c3e50;">📋 Loaded Data Preview:</h3>
        <table id="preview-table"></table>
    </div>

    <div id="reader"></div>
    <button id="startBtn" class="btn btn-success" style="display:none;">📷 Start Camera</button>
    <button id="stopBtn" class="btn btn-danger" style="display:none;">⏹ Stop Camera</button>

    <div id="result-box"></div>

    <button id="downloadBtn" class="btn btn-primary" style="display:none; margin-top:20px;">💾 Download Updated Excel</button>

    <script>
        let stockData = [];
        let html5QrCode = null;
        let checkedCount = 0;
        let originalHeaders = [];

        // --- 1. HANDLE EXCEL UPLOAD & NORMALIZE ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Read with defval: "" to prevent undefined cells
                stockData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
                
                if (stockData.length === 0) {
                    alert("Error: The Excel file appears to be empty or has no headers in the first row.");
                    return;
                }

                // SMART HEADER NORMALIZATION
                stockData.forEach(row => {
                    const newRow = {};
                    for (const key in row) {
                        const lowerKey = key.toLowerCase().trim();
                        if (lowerKey.includes('item') && lowerKey.includes('code')) newRow['Item Code'] = row[key];
                        else if (lowerKey.includes('desc')) newRow['Description'] = row[key];
                        else if (lowerKey.includes('gold') && lowerKey.includes('type')) newRow['Gold Type'] = row[key];
                        else if (lowerKey.includes('gold') && lowerKey.includes('wt')) newRow['Gold Wt.'] = row[key];
                        else if (lowerKey.includes('labour') || lowerKey.includes('labor')) newRow['Labour'] = row[key];
                        else newRow[key] = row[key]; 
                    }
                    newRow['Checked'] = ''; 
                    
                    // Clear old keys and apply normalized keys
                    Object.keys(row).forEach(k => delete row[k]);
                    Object.assign(row, newRow);
                });

                // Save headers for export
                originalHeaders = Object.keys(stockData[0]);
                
                document.getElementById('totalCount').innerText = stockData.length;
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('downloadBtn').style.display = 'inline-block';
                
                renderPreviewTable();
                alert(`✅ Successfully loaded ${stockData.length} items! Check the table below.`);
            };
            reader.readAsArrayBuffer(file);
        });

        // --- PREVIEW TABLE LOGIC ---
        function renderPreviewTable() {
            const container = document.getElementById('preview-container');
            const table = document.getElementById('preview-table');
            container.style.display = 'block';
            
            let html = '<thead><tr>';
            originalHeaders.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            
            stockData.forEach((row, index) => {
                let rowClass = row['Checked'] === '✓' ? 'checked-row' : '';
                html += `<tr class="${rowClass}" id="row-${index}">`;
                originalHeaders.forEach(h => {
                    html += `<td>${row[h] !== undefined ? row[h] : ''}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody>';
            table.innerHTML = html;
        }

        // --- 2. CAMERA SCANNING LOGIC ---
        document.getElementById('startBtn').addEventListener('click', () => {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, () => {})
            .then(() => {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-block';
            }).catch(err => alert("Camera error: " + err));
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('stopBtn').style.display = 'none';
                });
            }
        });

        function onScanSuccess(decodedText) {
            html5QrCode.pause(); 
            
            // Match Item Code (case-insensitive, trimmed)
            let itemIndex = stockData.findIndex(row => 
                row['Item Code'] && row['Item Code'].toString().trim().toLowerCase() === decodedText.trim().toLowerCase()
            );

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';

            if (itemIndex !== -1) {
                let item = stockData[itemIndex];
                if (item['Checked'] !== '✓') {
                    item['Checked'] = '✓';
                    checkedCount++;
                    document.getElementById('checkedCount').innerText = checkedCount;
                    
                    // Update visual preview table
                    const rowEl = document.getElementById(`row-${itemIndex}`);
                    if(rowEl) rowEl.classList.add('checked-row');
                }

                resultBox.className = 'found';
                resultBox.innerHTML = `
                    <h3 style="color:#2ecc71; margin-top:0;">✅ MATCH FOUND</h3>
                    <p><strong>Code:</strong> ${item['Item Code']}</p>
                    <p><strong>Desc:</strong> ${item['Description']}</p>
                    <p><strong>Gold:</strong> ${item['Gold Type']} | <strong>Wt:</strong> ${item['Gold Wt.']}</p>
                    <p><strong>Status:</strong> <span style="color:green; font-weight:bold;">Checked ✓</span></p>
                `;
            } else {
                resultBox.className = 'not-found';
                resultBox.innerHTML = `<h3 style="color:#e74c3c; margin-top:0;">❌ NOT FOUND</h3><p>Code: <strong>${decodedText}</strong> is not in the sheet.</p>`;
            }

            setTimeout(() => { if (html5QrCode) html5QrCode.resume(); }, 2000);
        }

        // --- 3. BULLETPROOF DOWNLOAD ---
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (stockData.length === 0) return alert("No data loaded!");

            // Force exact column order for export
            const ws = XLSX.utils.json_to_sheet(stockData, { header: originalHeaders });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Stock");
            
            // Set column widths so it looks nice in Excel
            ws['!cols'] = originalHeaders.map(() => ({ wch: 15 }));
            
            XLSX.writeFile(wb, "Stock_Updated_" + new Date().toISOString().slice(0,10) + ".xlsx");
        });
    </script>
</body>
</html>
