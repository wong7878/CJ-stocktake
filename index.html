<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CJ Stock Check</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background: #f4f4f9; color: #333; }
        h2 { color: #2c3e50; }
        .btn { padding: 15px 25px; font-size: 18px; margin: 10px 5px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        .btn-primary { background: #3498db; }
        .btn-success { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        #result-box { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; text-align: left; }
        .found { border-left: 5px solid #2ecc71; }
        .not-found { border-left: 5px solid #e74c3c; }
        .stat { font-size: 18px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        input[type="file"] { margin: 15px 0; display: block; margin-left: auto; margin-right: auto; }
        
        #preview-container { margin-top: 20px; overflow-x: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .checked-row { background-color: #d4edda; }
        
        #status-msg { font-size: 16px; color: #e67e22; font-weight: bold; margin: 10px 0; min-height: 24px; }
    </style>
</head>
<body>

    <h2>📦 CJ Stock Check</h2>
    <p class="stat">Scanned: <span id="checkedCount">0</span> / <span id="totalCount">0</span></p>

    <input type="file" id="fileInput" accept=".xlsx, .xls">
    
    <div id="preview-container">
        <h3 style="text-align: left; color: #2c3e50;">📋 Loaded Data Preview:</h3>
        <table id="preview-table"></table>
    </div>

    <!-- NATIVE CAMERA INPUT -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    
    <button id="scanBtn" class="btn btn-success" style="display:none;">📷 Scan Barcode (Opens Native Camera)</button>
    
    <p id="status-msg"></p>

    <div id="result-box"></div>

    <button id="downloadBtn" class="btn btn-primary" style="display:none; margin-top:20px;">💾 Download Updated Excel</button>

    <div id="temp-reader" style="display:none;"></div>

    <script>
        let stockData = [];
        let checkedCount = 0;
        let originalHeaders = [];
        const html5QrCodeFallback = new Html5Qrcode("temp-reader");

        function getFormattedDateTime() {
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0'); 
            const yy = String(now.getFullYear()).slice(-2); 
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            return `${dd}${mm}${yy}_${hh}:${min}:${ss}`;
        }

        // --- 1. HANDLE EXCEL UPLOAD ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                stockData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
                if (stockData.length === 0) return alert("Error: Excel file is empty.");

                stockData.forEach(row => {
                    const newRow = {};
                    for (const key in row) {
                        const lowerKey = key.toLowerCase().trim();
                        if (lowerKey.includes('item') && lowerKey.includes('code')) newRow['Item Code'] = row[key];
                        else if (lowerKey.includes('desc')) newRow['Description'] = row[key];
                        else if (lowerKey.includes('gold') && lowerKey.includes('type')) newRow['Gold Type'] = row[key];
                        else if (lowerKey.includes('gold') && lowerKey.includes('wt')) newRow['Gold Wt.'] = row[key];
                        else if (lowerKey.includes('labour') || lowerKey.includes('labor')) newRow['Labour'] = row[key];
                        else newRow[key] = row[key]; 
                    }
                    newRow['Checked'] = ''; 
                    newRow['Scan Date/Time'] = ''; 
                    Object.keys(row).forEach(k => delete row[k]);
                    Object.assign(row, newRow);
                });

                originalHeaders = Object.keys(stockData[0]);
                if (!originalHeaders.includes('Scan Date/Time')) originalHeaders.push('Scan Date/Time');
                
                document.getElementById('totalCount').innerText = stockData.length;
                document.getElementById('scanBtn').style.display = 'inline-block';
                document.getElementById('downloadBtn').style.display = 'inline-block';
                renderPreviewTable();
                alert(`✅ Loaded ${stockData.length} items! Tap "Scan Barcode" to open your native camera.`);
            };
            reader.readAsArrayBuffer(file);
        });

        function renderPreviewTable() {
            const container = document.getElementById('preview-container');
            const table = document.getElementById('preview-table');
            container.style.display = 'block';
            let html = '<thead><tr>';
            originalHeaders.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            stockData.forEach((row, index) => {
                let rowClass = row['Checked'] === '✓' ? 'checked-row' : '';
                html += `<tr class="${rowClass}" id="row-${index}">`;
                originalHeaders.forEach(h => html += `<td>${row[h] !== undefined ? row[h] : ''}</td>`);
                html += '</tr>';
            });
            table.innerHTML = html + '</tbody>';
        }

        // --- 2. NATIVE CAMERA & IMAGE COMPRESSION ENGINE ---
        document.getElementById('scanBtn').addEventListener('click', () => {
            document.getElementById('cameraInput').click();
        });

        document.getElementById('cameraInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const statusMsg = document.getElementById('status-msg');
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';
            statusMsg.innerText = "⏳ Compressing high-res photo...";

            try {
                // 1. COMPRESS IMAGE (Prevents browser crash on large photos)
                const compressedBlob = await compressImage(file, 1280);
                const compressedFile = new File([compressedBlob], "scan.jpg", { type: "image/jpeg" });
                
                statusMsg.innerText = "⏳ Scanning barcode...";
                
                // 2. SCAN COMPRESSED IMAGE
                let decodedText = "";
                
                // Try Android's Native BarcodeDetector first (Extremely fast)
                if ('BarcodeDetector' in window) {
                    try {
                        const detector = new BarcodeDetector({ 
                            formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'qr_code'] 
                        });
                        const barcodes = await detector.detect(compressedFile);
                        if (barcodes.length > 0) decodedText = barcodes[0].rawValue;
                    } catch (e) { console.warn("Native API failed, using fallback."); }
                }
                
                // Fallback to html5-qrcode
                if (!decodedText) {
                    decodedText = await html5QrCodeFallback.scanFile(compressedFile, true);
                }

                statusMsg.innerText = "";
                processMatch(decodedText);

            } catch (err) {
                statusMsg.innerText = "";
                resultBox.style.display = 'block';
                resultBox.className = 'not-found';
                resultBox.innerHTML = `<h3 style="color:#e74c3c; text-align:center;">❌ NO BARCODE DETECTED</h3><p style="text-align:center;">Could not find a barcode in the photo. Please ensure good lighting and try again.</p>`;
            }

            this.value = ''; // Reset to allow taking another photo immediately
        });

        // COMPRESSION FUNCTION (Crucial for mobile stability)
        function compressImage(file, maxWidth = 1280) {
            return new Promise((resolve) => {
                const img = new Image();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (maxWidth / width) * height;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    // 0.7 quality is more than enough for barcode scanning
                    canvas.toBlob(resolve, 'image/jpeg', 0.7); 
                };
                img.src = URL.createObjectURL(file);
            });
        }

        function processMatch(decodedText) {
            let itemIndex = stockData.findIndex(row => 
                row['Item Code'] && row['Item Code'].toString().trim().toLowerCase() === decodedText.trim().toLowerCase()
            );

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';

            if (itemIndex !== -1) {
                let item = stockData[itemIndex];
                if (item['Checked'] !== '✓') {
                    checkedCount++;
                    document.getElementById('checkedCount').innerText = checkedCount;
                }
                item['Checked'] = '✓';
                item['Scan Date/Time'] = getFormattedDateTime(); 
                
                const rowEl = document.getElementById(`row-${itemIndex}`);
                if(rowEl) {
                    rowEl.classList.add('checked-row');
                    const cells = rowEl.getElementsByTagName('td');
                    const timeColIndex = originalHeaders.indexOf('Scan Date/Time');
                    if(timeColIndex !== -1 && cells[timeColIndex]) cells[timeColIndex].innerText = item['Scan Date/Time'];
                }

                resultBox.className = 'found';
                resultBox.innerHTML = `
                    <h3 style="color:#2ecc71; margin-top:0;">✅ MATCH FOUND</h3>
                    <p><strong>Code:</strong> ${item['Item Code']}</p>
                    <p><strong>Desc:</strong> ${item['Description']}</p>
                    <p><strong>Gold:</strong> ${item['Gold Type']} | <strong>Wt:</strong> ${item['Gold Wt.']}</p>
                    <p><strong>Scanned At:</strong> <span style="color:blue; font-weight:bold;">${item['Scan Date/Time']}</span></p>
                `;
            } else {
                resultBox.className = 'not-found';
                resultBox.innerHTML = `<h3 style="color:#e74c3c; margin-top:0;">❌ NOT FOUND</h3><p>Code: <strong>${decodedText}</strong> is not in the sheet.</p>`;
            }
        }

        // --- 3. DOWNLOAD ---
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (stockData.length === 0) return alert("No data loaded!");
            const ws = XLSX.utils.json_to_sheet(stockData, { header: originalHeaders });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "CJ Stock");
            ws['!cols'] = originalHeaders.map(() => ({ wch: 18 }));
            XLSX.writeFile(wb, "CJ_Stock_Check_" + getFormattedDateTime() + ".xlsx");
        });
    </script>
</body>
</html>
