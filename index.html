<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CJ Stock Check</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background: #f4f4f9; color: #333; margin: 0; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        
        /* Camera Viewfinder Styles */
        #reader { width: 100%; max-width: 400px; margin: 10px auto; border: 3px solid #3498db; border-radius: 12px; background: #000; display: none; }
        #reader video { border-radius: 10px; }

        .btn { padding: 15px 25px; font-size: 18px; margin: 10px 5px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 350px; display: block; margin-left: auto; margin-right: auto; }
        .btn-primary { background: #3498db; }
        .btn-success { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        .btn:disabled { background: #95a5a6; cursor: not-allowed; }

        #result-box { margin-top: 15px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; text-align: left; transition: all 0.3s ease; }
        .found { border-left: 6px solid #2ecc71; background-color: #eafaf1; }
        .not-found { border-left: 6px solid #e74c3c; background-color: #fdedec; }
        
        .stat { font-size: 20px; font-weight: bold; color: #2c3e50; margin: 10px 0; background: white; padding: 10px; border-radius: 8px; max-width: 350px; margin-left: auto; margin-right: auto;}
        input[type="file"] { margin: 15px 0; display: block; margin-left: auto; margin-right: auto; font-size: 16px; }
        
        #preview-container { margin-top: 20px; overflow-x: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; text-align: left; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #2c3e50; color: white; position: sticky; top: 0; }
        .checked-row { background-color: #d4edda !important; font-weight: bold; }
        
        .scan-status { font-size: 16px; color: #e67e22; font-weight: bold; margin: 10px 0; min-height: 24px; }
    </style>
</head>
<body>

    <h2>📦 CJ Stock Check</h2>
    <div class="stat">Scanned: <span id="checkedCount">0</span> / <span id="totalCount">0</span></div>

    <!-- 1. UPLOAD EXCEL -->
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    
    <div id="preview-container">
        <h3 style="text-align: center; color: #2c3e50; margin-top:0;">📋 Loaded Data Preview</h3>
        <table id="preview-table"></table>
    </div>

    <!-- 2. CAMERA VIEWFINDER -->
    <div id="reader"></div>
    <p class="scan-status" id="scanStatus"></p>

    <!-- 3. CONTROL BUTTONS -->
    <button id="startBtn" class="btn btn-success" style="display:none;">▶️ Start Continuous Scan</button>
    <button id="stopBtn" class="btn btn-danger" style="display:none;">⏹ Stop Scanning</button>

    <div id="result-box"></div>

    <!-- 4. DOWNLOAD -->
    <button id="downloadBtn" class="btn btn-primary" style="display:none; margin-top:20px;">💾 Download Updated Excel</button>

    <script>
        let stockData = [];
        let checkedCount = 0;
        let originalHeaders = [];
        let html5QrCode = null;
        let isScanning = false;

        function getFormattedDateTime() {
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0'); 
            const yy = String(now.getFullYear()).slice(-2); 
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            return `${dd}${mm}${yy}_${hh}:${min}:${ss}`;
        }

        // --- 1. HANDLE EXCEL UPLOAD ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                stockData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
                if (stockData.length === 0) return alert("Error: Excel file is empty.");

                stockData.forEach(row => {
                    const newRow = {};
                    for (const key in row) {
                        const lowerKey = key.toLowerCase().trim();
                        if (lowerKey.includes('item') && lowerKey.includes('code')) newRow['Item Code'] = row[key];
                        else if (lowerKey.includes('desc')) newRow['Description'] = row[key];
                        else if (lowerKey.includes('gold') && lowerKey.includes('type')) newRow['Gold Type'] = row[key];
                        else if (lowerKey.includes('gold') && lowerKey.includes('wt')) newRow['Gold Wt.'] = row[key];
                        else if (lowerKey.includes('labour') || lowerKey.includes('labor')) newRow['Labour'] = row[key];
                        else newRow[key] = row[key]; 
                    }
                    newRow['Checked'] = ''; 
                    newRow['Scan Date/Time'] = ''; 
                    Object.keys(row).forEach(k => delete row[k]);
                    Object.assign(row, newRow);
                });

                originalHeaders = Object.keys(stockData[0]);
                if (!originalHeaders.includes('Scan Date/Time')) originalHeaders.push('Scan Date/Time');
                
                document.getElementById('totalCount').innerText = stockData.length;
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'block';
                renderPreviewTable();
                alert(`✅ Loaded ${stockData.length} items! Tap "Start Continuous Scan".`);
            };
            reader.readAsArrayBuffer(file);
        });

        function renderPreviewTable() {
            const container = document.getElementById('preview-container');
            const table = document.getElementById('preview-table');
            container.style.display = 'block';
            let html = '<thead><tr>';
            originalHeaders.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            stockData.forEach((row, index) => {
                let rowClass = row['Checked'] === '✓' ? 'checked-row' : '';
                html += `<tr class="${rowClass}" id="row-${index}">`;
                originalHeaders.forEach(h => html += `<td>${row[h] !== undefined ? row[h] : ''}</td>`);
                html += '</tr>';
            });
            table.innerHTML = html + '</tbody>';
        }

        // --- 2. CONTINUOUS SCANNING LOGIC ---
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('reader').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, () => {})
            .then(() => {
                isScanning = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('scanStatus').innerText = "🟢 Camera Active - Point at barcode";
            }).catch(err => alert("Camera error: " + err));
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            if (html5QrCode && isScanning) {
                html5QrCode.stop().then(() => {
                    isScanning = false;
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('scanStatus').innerText = "🔴 Camera Stopped";
                }).catch(err => console.log(err));
            }
        });

        function onScanSuccess(decodedText) {
            // 1. PAUSE scanning immediately so it doesn't read the same tag 50 times
            if (isScanning) html5QrCode.pause(); 
            document.getElementById('scanStatus').innerText = "⏳ Processing Match...";

            let itemIndex = stockData.findIndex(row => 
                row['Item Code'] && row['Item Code'].toString().trim().toLowerCase() === decodedText.trim().toLowerCase()
            );

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';

            if (itemIndex !== -1) {
                let item = stockData[itemIndex];
                if (item['Checked'] !== '✓') {
                    checkedCount++;
                    document.getElementById('checkedCount').innerText = checkedCount;
                }
                item['Checked'] = '✓';
                item['Scan Date/Time'] = getFormattedDateTime(); 
                
                // Update Preview Table
                const rowEl = document.getElementById(`row-${itemIndex}`);
                if(rowEl) {
                    rowEl.classList.add('checked-row');
                    const cells = rowEl.getElementsByTagName('td');
                    const timeColIndex = originalHeaders.indexOf('Scan Date/Time');
                    if(timeColIndex !== -1 && cells[timeColIndex]) cells[timeColIndex].innerText = item['Scan Date/Time'];
                }

                resultBox.className = 'found';
                resultBox.innerHTML = `
                    <h3 style="color:#27ae60; margin-top:0;">✅ MATCH FOUND</h3>
                    <p><strong>Code:</strong> ${item['Item Code']}</p>
                    <p><strong>Desc:</strong> ${item['Description']}</p>
                    <p><strong>Gold:</strong> ${item['Gold Type']} | <strong>Wt:</strong> ${item['Gold Wt.']}</p>
                    <p><strong>Scanned At:</strong> <span style="color:blue; font-weight:bold;">${item['Scan Date/Time']}</span></p>
                `;
            } else {
                resultBox.className = 'not-found';
                resultBox.innerHTML = `<h3 style="color:#c0392b; margin-top:0;">❌ NOT FOUND</h3><p>Code: <strong>${decodedText}</strong> is not in the sheet.</p>`;
            }

            // 2. RESUME scanning after 2.5 seconds
            setTimeout(() => {
                if (html5QrCode && isScanning) {
                    html5QrCode.resume();
                    document.getElementById('scanStatus').innerText = "🟢 Camera Active - Point at barcode";
                }
            }, 2500);
        }

        // --- 3. DOWNLOAD ---
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (stockData.length === 0) return alert("No data loaded!");
            const ws = XLSX.utils.json_to_sheet(stockData, { header: originalHeaders });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "CJ Stock");
            ws['!cols'] = originalHeaders.map(() => ({ wch: 18 }));
            XLSX.writeFile(wb, "CJ_Stock_Check_" + getFormattedDateTime() + ".xlsx");
        });
    </script>
</body>
</html>
